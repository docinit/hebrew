<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер предлогов (Pro)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&display=swap');
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f0f2f5;
        }
        .hebrew-text {
            font-size: 2.8rem;
            font-weight: bold;
        }
        .btn-option {
            transition: all 0.2s ease;
        }
        .btn-option:active {
            transform: scale(0.95);
        }
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="app" class="bg-white rounded-3xl shadow-xl p-6 sm:p-10 w-full max-w-2xl text-center">
        <div id="loader" class="flex flex-col items-center justify-center py-10">
            <div class="loading-spinner mb-4"></div>
            <p class="text-slate-500">Загрузка данных из GitHub...</p>
        </div>

        <div id="main-content" class="hidden">
            <div class="mb-6 text-right">
                <div class="flex justify-between items-center mb-2">
                    <span id="score-text" class="text-sm font-bold text-blue-600">הצלחה: 0</span>
                    <span id="progress-text" class="text-sm text-gray-500">שאלה 1 מתוך ...</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2">
                    <div id="progress-bar" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div id="quiz-ui">
                <div class="mb-2 text-gray-400 text-sm">מהי מילת היחס הנכונה?</div>
                <h1 id="verb-display" class="hebrew-text text-slate-800 mb-2">...</h1>
                <p id="verb-translation" class="text-slate-500 italic text-lg mb-8">...</p>

                <div id="options-grid" class="grid grid-cols-2 gap-3"></div>
            </div>

            <div id="feedback-ui" class="hidden mt-8">
                <div id="feedback-box" class="p-4 rounded-2xl mb-4 font-bold text-lg"></div>
                <button id="next-btn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition">הבא</button>
            </div>

            <div id="result-screen" class="hidden py-10">
                <h2 class="text-3xl font-bold mb-4">כל הכבוד!</h2>
                <p class="text-xl mb-6">סיימת את האימון עם תוצאה של:</p>
                <div id="final-score" class="text-5xl font-bold text-blue-600 mb-8"></div>
                <button onclick="location.reload()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold">התחל מחדש</button>
            </div>
        </div>
    </div>

    <script>
        const DATA_URL = "https://github.com/docinit/hebrew/verb_preps.txt";
        
        const allPossiblePrepositions = ["את", "ל", "ב", "על", "מ", "עם", "אחרי", "בין", "כ", "על פי", "לגבי"];
        let rawData = [];
        let currentPool = [];
        let currentIndex = 0;
        let correctCount = 0;
        const quizLimit = 50;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        async function loadData() {
            try {
                const response = await fetch(DATA_URL);
                if (!response.ok) throw new Error("Ошибка загрузки данных");
                rawData = await response.json();
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                
                initQuiz();
            } catch (err) {
                document.getElementById('loader').innerHTML = `
                    <p class="text-red-500 font-bold">Ошибка загрузки данных из GitHub.</p>
                    <p class="text-xs text-slate-400 mt-2">${err.message}</p>
                    <button onclick="location.reload()" class="mt-4 text-blue-500 underline">Попробовать снова</button>
                `;
            }
        }

        function initQuiz() {
            let pool = [...rawData];
            
            shuffleArray(pool);
            
            currentPool = pool.slice(0, Math.min(pool.length, quizLimit));
            
            currentIndex = 0;
            correctCount = 0;
            renderQuestion();
        }

        function renderQuestion() {
            if (currentIndex >= currentPool.length) {
                showResults();
                return;
            }

            const currentItem = currentPool[currentIndex];
            const correctList = currentItem.p.split(',').map(s => s.trim());
            
            const targetPreposition = correctList[Math.floor(Math.random() * correctList.length)];
            
            document.getElementById('verb-display').innerText = currentItem.v;
            document.getElementById('verb-translation').innerText = currentItem.t;
            document.getElementById('progress-text').innerText = `שאלה ${currentIndex + 1} מתוך ${currentPool.length}`;
            document.getElementById('progress-bar').style.width = `${(currentIndex / currentPool.length) * 100}%`;
            document.getElementById('score-text').innerText = `הצלחה: ${correctCount}`;
            
            const optionsGrid = document.getElementById('options-grid');
            optionsGrid.innerHTML = '';
            document.getElementById('feedback-ui').classList.add('hidden');

            let distractors = allPossiblePrepositions.filter(p => !correctList.includes(p));
            shuffleArray(distractors);
            
            let finalOptions = [targetPreposition, ...distractors.slice(0, 3)];
            shuffleArray(finalOptions);

            finalOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-option p-4 bg-white border-2 border-gray-200 rounded-2xl text-2xl font-bold text-slate-700 hover:border-blue-500 hover:bg-blue-50";
                btn.innerText = opt;
                btn.onclick = () => handleSelect(opt, btn, correctList);
                optionsGrid.appendChild(btn);
            });
        }

        function handleSelect(selected, btn, allCorrectList) {
            const btns = document.getElementById('options-grid').querySelectorAll('button');
            btns.forEach(b => b.disabled = true);

            const feedbackBox = document.getElementById('feedback-box');
            document.getElementById('feedback-ui').classList.remove('hidden');

            if (allCorrectList.includes(selected)) {
                correctCount++;
                btn.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                feedbackBox.className = "p-4 rounded-2xl mb-4 font-bold text-lg bg-green-100 text-green-800 text-center";
                feedbackBox.innerText = allCorrectList.length > 1 
                    ? `נכון! אפשר גם: ${allCorrectList.filter(x => x !== selected).join(', ')}` 
                    : "כל הכבוד! תשובה נכונה.";
            } else {
                btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
                feedbackBox.className = "p-4 rounded-2xl mb-4 font-bold text-lg bg-red-100 text-red-800 text-center";
                feedbackBox.innerText = `טעות. התשובה הנכונה: ${allCorrectList.join(' או ')}`;
                btns.forEach(b => {
                    if (allCorrectList.includes(b.innerText)) b.classList.add('border-green-500', 'bg-green-50');
                });
            }
        }

        document.getElementById('next-btn').onclick = () => {
            currentIndex++;
            renderQuestion();
        };

        function showResults() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('feedback-ui').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${correctCount} / ${currentPool.length}`;
            document.getElementById('progress-bar').style.width = "100%";
        }

        loadData();
    </script>
</body>
</html>
